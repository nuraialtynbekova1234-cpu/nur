<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Магазин одежды</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }
        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .product {
            background: white;
            margin: 15px;
            padding: 15px;
            width: 200px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        .price {
            color: green;
            font-weight: bold;
        }
        button {
            background: black;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #555;
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Магазин одежды</h1>
    <p>Стильная одежда для всех</p>
</header>

<nav>
    <a href="#">Главная</a>
    <a href="#">Каталог</a>
    <a href="#">Контакты</a>
</nav>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Футболка">
        <h3>Футболка</h3>
        <p class="price">5000 ₸</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Куртка">
        <h3>Куртка</h3>
        <p class="price">15000 ₸</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Джинсы">
        <h3>Джинсы</h3>
        <p class="price">10000 ₸</p>
        <button>Купить</button>
    </div>

</div>

<footer>
    <p>© 2026 Магазин одежды</p>
</footer>

</body>
</html>
